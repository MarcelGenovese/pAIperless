version: '3.8'

services:
  paiperless:
    build: .
    container_name: paiperless
    ports:
      - "3002:3000"      # Web UI
      - "21:21"          # FTP control port
      - "1024-1048:1024-1048"  # FTP passive mode data ports
    volumes:
      - ./storage/consume:/app/storage/consume
      - ./storage/processing:/app/storage/processing
      - ./storage/error:/app/storage/error
      - ./storage/completed:/app/storage/completed
      - ./storage/logs:/app/storage/logs
      - db-data:/app/storage/database
    environment:
      - DATABASE_URL=file:/app/storage/database/paiperless.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3002}
      - NODE_ENV=production
      # FTP Server Configuration (Optional - Usually not needed!)
      # The FTP server automatically uses the IP that clients connect to.
      # Only set this if you're behind NAT and need to specify a public IP.
      - FTP_PASV_URL=${FTP_PASV_URL:-}
    restart: unless-stopped
    networks:
      - paiperless

networks:
  paiperless:
    driver: bridge

volumes:
  db-data:
    driver: local
